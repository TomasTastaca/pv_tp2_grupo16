<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 20 - Datos Estudiante</title>
    <link rel="stylesheet" href="../css/ejercicio20.css">
</head>
<body>
    <h1>Registro de Estudiante</h1>
    <form id="formularioEstudiante">
        <div>
            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Ej: María">
        </div>
        <div>
            <label>Apellido:</label>
            <input type="text" id="apellido" placeholder="Ej: Diaz">
        </div>
        <div>
            <label>Libreta Universitaria:</label>
            <input type="text" id="lu" placeholder="Ej: APU999999">
        </div>
        <br>
        <button type="button" id="btnMostrar">Mostrar Datos</button>
    </form>

    <script type="module" src="../js/ejercicio20.js"></script>
</body>
</html>
