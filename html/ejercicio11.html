<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio11</title>
</head>
<body>
    <script>
       const km = parseFloat(prompt("Ingrese los kilómetros recorridos:"));
	   const ls = parseFloat(prompt("Ingrese los litros de combustible consumidos:"));

	   const consumoPorKm = ls / km;
    document.write(`El consumo de combustible por kilómetro es: ${consumoPorKm.toFixed(2)} litros/km`)

    </script>
</body>
</html>
