<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio14</title>
</head>
<body>
    <script>
    let cantidad = parseInt(prompt("¿Cuántos números desea ingresar?"));
    let numeros = []; 

    for (let i = 0; i < cantidad; i++) {
        let numero = parseInt(prompt(`Ingrese el número ${i + 1}:`));
        numeros.push(numero);
    }

    const duplicar = (numeros) => {
        let duplicados = [];

        for (let i = 0; i < numeros.length; i++) {
            duplicados.push(numeros[i] * 2); 
        }

        return duplicados;
    };

    let resultado = duplicar(numeros);

    document.write(`Numeros ingresados: ${numeros}<br>`);
    document.write(`Numeros duplicados: ${resultado}`);
    </script>
</body>
</html>
