<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 24</title>
    <link rel="stylesheet" href="../css/ejercicio24.css">
</head>
<body>
    <div class="contenedor">
        <h1>Selecciona tu lenguaje de programación favorito</h1>

        <form class="opciones">
            <label>
                <input type="radio" name="lenguaje" value="Python">
                Python
            </label>

            <label>
                <input type="radio" name="lenguaje" value="C++">
                C++
            </label>

            <label>
                <input type="radio" name="lenguaje" value="PSeInt">
                PSeInt
            </label>

            <label>
                <input type="radio" name="lenguaje" value="Javascript">
                Javascript
            </label>

            <label>
                <input type="radio" name="lenguaje" value="C#">
                C#
            </label>

            <label>
                <input type="radio" name="lenguaje" value="Java">
                Java
            </label>
        </form>

        <p id="resultado">Aún no has seleccionado un lenguaje.</p>
    </div>

    <script type="module" src="../js/ejercicio24.js"></script>
</body>
</html>
